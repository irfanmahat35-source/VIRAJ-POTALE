<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viraj | Cinematographer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@800&display=swap');
        
        :root { --gold: #c5a059; --bg: #080808; }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
        }

        .cinematic-header { 
            font-family: 'Syne', sans-serif; 
            text-transform: uppercase; 
            line-height: 0.8; 
            letter-spacing: -0.05em; 
        }
        
        .cinematic-img {
            filter: grayscale(100%);
            transition: filter 0.7s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s ease;
        }
        .cinematic-img:hover {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .glass-nav { 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .video-card {
            position: relative;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }
        .video-card:hover { 
            border-color: var(--gold); 
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.15); 
        }

        .btn-gold {
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 28px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            font-weight: 700;
            display: inline-block;
        }
        .btn-gold:hover {
            background: var(--gold);
            color: #000;
        }

        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body>

    <nav class="glass-nav fixed w-full z-50 px-6 md:px-12 py-5 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter uppercase tracking-widest">VIRAJ</div>
        <div class="flex gap-6 md:gap-10 text-[10px] md:text-xs uppercase tracking-widest font-bold">
            <a href="#work" class="hover:text-[#c5a059] transition">Portfolio</a>
            <a href="https://drive.google.com/file/d/1k56Nxg1S11yjCpGrt2LvIqB38TE4m7Sx/view?usp=drivesdk" target="_blank" class="text-[#c5a059] border-b border-[#c5a059]/30 pb-1">Resume</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-4 relative">
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(var(--gold) 0.5px, transparent 0.5px); background-size: 30px 30px;"></div>
        
        <span class="text-xs uppercase tracking-[0.5em] mb-6 text-gray-500" data-aos="fade-down">Cinematographer & Editor</span>
        <h1 class="cinematic-header text-6xl md:text-[10rem] mb-6" data-aos="zoom-out" data-aos-delay="200">
            Visual<br>Poetry
        </h1>
        
        <div class="flex flex-col md:flex-row gap-6 mt-8" data-aos="fade-up" data-aos-delay="400">
            <a href="https://drive.google.com/file/d/1k56Nxg1S11yjCpGrt2LvIqB38TE4m7Sx/view?usp=drivesdk" target="_blank" class="btn-gold">
                Download Resume
            </a>
            <a href="#work" class="px-8 py-3 text-[0.8rem] uppercase tracking-widest border border-white/20 hover:bg-white hover:text-black transition font-bold">
                See Projects
            </a>
        </div>
    </section>

    <section id="work" class="py-24 px-6 md:px-12">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h2 class="text-xs uppercase tracking-[0.3em] text-[#c5a059] mb-2">Selected Works</h2>
                <h3 class="text-4xl font-bold uppercase">The Gallery</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="video-card group" data-aos="fade-up">
                <div class="aspect-video bg-zinc-900 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1492691523567-30730029ad0a?auto=format&fit=crop&q=80&w=800" alt="Work" class="cinematic-img w-full h-full object-cover">
                </div>
                <div class="p-6">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Short Film / 2024</p>
                    <h4 class="text-xl font-bold uppercase tracking-tight">Midnight Echoes</h4>
                </div>
            </div>

            <div class="video-card group" data-aos="fade-up" data-aos-delay="100">
                <div class="aspect-video bg-zinc-900 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&q=80&w=800" alt="Work" class="cinematic-img w-full h-full object-cover">
                </div>
                <div class="p-6">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Music Video / 2023</p>
                    <h4 class="text-xl font-bold uppercase tracking-tight">Golden Hour</h4>
                </div>
            </div>

            <div class="video-card group" data-aos="fade-up" data-aos-delay="200">
                <div class="aspect-video bg-zinc-900 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=800" alt="Work" class="cinematic-img w-full h-full object-cover">
                </div>
                <div class="p-6">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">Commercial / 2024</p>
                    <h4 class="text-xl font-bold uppercase tracking-tight">Urban Jungle</h4>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 px-6 border-t border-white/5 text-center">
        <h2 class="text-5xl md:text-7xl font-bold cinematic-header mb-10" data-aos="fade-up">Let's Create</h2>
        <div class="flex justify-center gap-8 text-sm uppercase tracking-[0.2em] font-bold">
            <a href="mailto:viraj@example.com" class="hover:text-[#c5a059] transition">Email</a>
            <a href="#" class="hover:text-[#c5a059] transition">Instagram</a>
            <a href="#" class="hover:text-[#c5a059] transition">LinkedIn</a>
        </div>
        <p class="mt-16 text-[10px] text-gray-600 uppercase tracking-widest">© 2026 Viraj. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Animation Init
        AOS.init({ 
            duration: 1000, 
            once: true,
            easing: 'ease-out-cubic'
        });

        // Simple Smooth Scroll for Anchors
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
                                                                                                     </html>
